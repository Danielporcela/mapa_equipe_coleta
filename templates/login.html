<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Sistema Frota</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;

      background:url('/static/img/fundo.jpg');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;

      position:relative;
      overflow:hidden;
    }

    /* ESCURECER FUNDO */

    body::before{
      content:'';
      position:absolute;
      width:100%;
      height:100%;
      top:0;
      left:0;

      background:rgba(0,0,0,0.55);
    }

    /* CARD LOGIN */

    .login-container{

      position:relative;
      z-index:1;

      width:100%;
      max-width:420px;

      padding:40px;

      border-radius:20px;

      background:linear-gradient(
        135deg,
        rgba(15,23,42,0.95),
        rgba(30,41,59,0.95),
        rgba(51,65,85,0.95)
      );

      backdrop-filter:blur(8px);

      border:1px solid rgba(255,255,255,0.1);

      box-shadow:
      0 10px 30px rgba(0,0,0,0.5),
      0 0 20px rgba(255,255,255,0.08);

    }

    .login-container h1{
      text-align:center;
      color:white;
      margin-bottom:30px;
      font-size:32px;
      letter-spacing:1px;
    }

    /* INPUTS */

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      color:#e2e8f0;
      font-weight:bold;
      font-size:14px;
    }

    .input-group input{

      width:100%;

      padding:14px;

      border-radius:10px;

      border:1px solid rgba(255,255,255,0.15);

      background:rgba(255,255,255,0.08);

      color:white;

      font-size:16px;

      transition:0.3s;

    }

    .input-group input::placeholder{
      color:#cbd5e1;
    }

    .input-group input:focus{

      outline:none;

      border-color:#3b82f6;

      box-shadow:0 0 10px rgba(59,130,246,0.4);

      background:rgba(255,255,255,0.12);

    }

    /* BOTÃO */

    .btn-login{

      width:100%;

      padding:14px;

      border:none;

      border-radius:10px;

      background:linear-gradient(
        135deg,
        #2563eb,
        #1d4ed8
      );

      color:white;

      font-size:16px;

      font-weight:bold;

      cursor:pointer;

      transition:0.3s;

      margin-top:10px;

    }

    .btn-login:hover{

      transform:translateY(-2px);

      box-shadow:0 5px 15px rgba(37,99,235,0.5);

    }

    /* LINKS */

    .links{

      margin-top:20px;

      display:flex;

      justify-content:space-between;

      font-size:14px;

    }

    .links a{

      text-decoration:none;

      color:#93c5fd;

      transition:0.3s;

    }

    .links a:hover{
      color:white;
      text-decoration:underline;
    }

    /* RESPONSIVO */

    @media(max-width:480px){

      .login-container{
        margin:20px;
        padding:30px 20px;
      }

      .login-container h1{
        font-size:28px;
      }

    }

  </style>
</head>
<body>

  <div class="login-container">

    <h1>LOGIN</h1>

    <form id="formLogin">

      <div class="input-group">

        <label>Email</label>

        <input
          type="email"
          id="email"
          placeholder="Digite seu email"
          required
        >

      </div>

      <div class="input-group">

        <label>Senha</label>

        <input
          type="password"
          id="senha"
          placeholder="Digite sua senha"
          required
        >

      </div>

      <button type="submit" class="btn-login">
        Entrar
      </button>

      <div class="links">

        <a href="#">
          Esqueci minha senha
        </a>

        <a href="#">
          Criar conta
        </a>

      </div>

    </form>

  </div>

  <script>

    const form = document.getElementById('formLogin');

    form.addEventListener('submit', function(e){

      e.preventDefault();

      const email = document.getElementById('email').value;

      const senha = document.getElementById('senha').value;

      if(email === 'supervisor' && senha === 'luciano'){

        window.location.href = '/dashboard';

      } else {

        alert('Email ou senha inválidos!');

      }

    });

  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editar Equipe</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: #fff;
}

/* CARD */
.card {
    border-radius: 20px;
    background: #ffffff;
    color: #000;
}

/* INPUTS */
.form-control {
    border-radius: 10px;
}

/* BOTÕES */
.btn {
    border-radius: 10px;
}

/* TÍTULO */
.titulo {
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container mt-5">

<!-- TOPO -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="titulo">✏️ Editar Equipe</h2>
    <a href="{{ url_for('equipes') }}" class="btn btn-secondary">⬅ Voltar</a>
</div>

<!-- CARD FORM -->
<div class="card shadow p-4">

<form method="POST" action="{{ url_for('salvar') }}">

<input type="hidden" name="id" value="{{ equipe.id }}">

<div class="row g-3">

<!-- SETOR -->
<div class="col-md-4">
<label class="form-label">Setor</label>
<input class="form-control" name="setor_id" value="{{ equipe.Setor_ID }}" required>
</div>

<!-- FROTA -->
<div class="col-md-4">
<label class="form-label">Frota</label>
<input class="form-control" name="frota" value="{{ equipe.Frota }}">
</div>

<!-- HORA -->
<div class="col-md-4">
<label class="form-label">Hora Saída</label>
<input type="time" class="form-control" name="hora_saida" value="{{ equipe.Hora_Saida }}">
</div>

<!-- MOTORISTA -->
<div class="col-md-6">
<label class="form-label">Motorista</label>
<input class="form-control" name="motorista" value="{{ equipe.Motorista }}" placeholder="Ex: M90">
</div>

<!-- C1 -->
<div class="col-md-2">
<label class="form-label">C1</label>
<input class="form-control" name="c1" value="{{ equipe.C1 }}">
</div>

<!-- C2 -->
<div class="col-md-2">
<label class="form-label">C2</label>
<input class="form-control" name="c2" value="{{ equipe.C2 }}">
</div>

<!-- C3 -->
<div class="col-md-2">
<label class="form-label">C3</label>
<input class="form-control" name="c3" value="{{ equipe.C3 }}">
</div>

</div>

<!-- BOTÕES -->
<div class="d-flex justify-content-end mt-4 gap-2">

<a href="{{ url_for('equipes') }}" class="btn btn-outline-secondary">
Cancelar
</a>

<button type="submit" class="btn btn-primary">
💾 Salvar Alterações
</button>

</div>

</form>

</div>

<!-- FLASH MESSAGES -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="mt-3">
      {% for msg in messages %}
        <div class="alert alert-info">{{ msg }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

</div>

</body>
</html>

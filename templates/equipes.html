<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipes</title>

<style>

body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 10px;
}

.container {
    width: 95%;
    max-width: 1100px;
    margin: auto;
}

.form-row {
    margin-top: 20px;
    display:flex;
    gap:5px;
    flex-wrap:wrap;
}

input,
select {
    padding: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 13px;
}

button {
    padding: 6px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: white;
    font-size: 12px;
}

.btn-mapa { background:#17a2b8; }
.btn-add { background: #007bff; }
.btn-save { background: #28a745; }
.btn-delete { background: #dc3545; }
.btn-voltar { background: #6c757d; }
.btn-print { background: #343a40; }

table {
    width: 100%;
    border-collapse: collapse;
    background:white;
}

th, td {
    padding: 3px;
    border-bottom: 1px solid #ddd;
    text-align: center;
    white-space: nowrap;
    font-size: 13px;
}

td input{
    width: 75px;
    padding: 4px;
    font-size: 12px;
}

.card{
    margin-bottom:15px;
}

.no-print{
    display:inline-block;
}

/* ================= IMPRESSÃO ================= */
@media print {

    @page{
        size:A4 landscape;
        margin:4mm;
    }

    html,
    body{
        width:100%;
        height:100%;
        margin:0;
        padding:0;
        background:white !important;
        zoom:68%;
        font-family:Arial,sans-serif;
    }

    .no-print,
    button,
    select{
        display:none !important;
    }

    .container,
    .card{
        width:100% !important;
        max-width:100% !important;
        margin:0 !important;
        padding:0 !important;
        box-shadow:none !important;
        border:none !important;
        background:white !important;
    }

    table{
        width:100% !important;
        border-collapse:collapse !important;
        table-layout:fixed;
    }

    tr{
        page-break-inside:avoid;
    }

    th, td {
        padding: 4px 6px;
        width: 1%;
        white-space: nowrap;
        font-size: 14px;
    }

    input{
        border:none !important;
        background:transparent !important;
        font-size:9px !important;
        width:100%;
        text-align:center;
    }

    th:last-child,
    td:last-child{
        display:none !important;
    }

}

</style>
</head>

<body>

<div class="container">

<!-- TOPO -->
<div class="card">

    <button class="btn-voltar no-print"
            onclick="window.location.href='/'">

        ⬅ Voltar

    </button>

    <form method="POST"
          action="/localizar"
          style="display:inline; margin-left:10px;"
          class="no-print">

        <input type="text"
               name="codigo"
               placeholder="Ex: M123 ou C900">

        <button type="submit"
                class="no-print"
                style="background:#28a745;">

            🔍 Localizar

        </button>

    </form>

    <button onclick="window.print()"
            class="btn-print no-print">

        🖨️ Imprimir

    </button>

    <form method="POST"
          action="/converter_todos"
          style="display:inline; margin-left:10px;"
          class="no-print">

        <select name="modo">

            <option value="">
                Converter todos
            </option>

            <option value="PD">
                Converter tudo para PD
            </option>

            <option value="ID">
                Converter tudo para ID
            </option>

        </select>

        <button type="submit"
                class="no-print"
                style="background:#ff9800;">

            🔄 Converter TODOS

        </button>

    </form>

</div>

<!-- ALERTAS -->
{% with messages = get_flashed_messages() %}
{% if messages %}

<div style="background:#ffc107;
            text-align:center;
            padding:10px;"
     class="no-print">

    {% for msg in messages %}
        <div>{{ msg }}</div>
    {% endfor %}

</div>

{% endif %}
{% endwith %}

<!-- CADASTRO -->
<form method="POST"
      action="/add"
      class="no-print">

<div class="form-row">

    <input name="setor_id" placeholder="Setor">
    <input name="frota" placeholder="Frota">
    <input name="motorista" placeholder="Motorista">
    <input name="c1" placeholder="C1">
    <input name="c2" placeholder="C2">
    <input name="c3" placeholder="C3">
    <input type="time" name="hora_saida">

    <button class="btn-add no-print">
        Cadastrar
    </button>

</div>

</form>

<!-- TABELA -->
<table>

<thead>

<tr>
    <th>Setor</th>
    <th>Frota</th>
    <th>Motorista</th>
    <th>C1</th>
    <th>C2</th>
    <th>C3</th>
    <th>Hora</th>
    <th class="no-print">Ações</th>
</tr>

</thead>

<tbody>

{% for e in dados %}

<form method="POST" action="/salvar">

<tr>

    <td>
        <input name="setor_id"
               value="{{ e.Setor_ID }}">
    </td>

    <td>
        <input name="frota"
               value="{{ e.Frota }}">
    </td>

    <td>
        <input name="motorista"
               value="{{ e.Motorista }}">
    </td>

    <td>
        <input name="c1"
               value="{{ e.C1 }}">
    </td>

    <td>
        <input name="c2"
               value="{{ e.C2 }}">
    </td>

    <td>
        <input name="c3"
               value="{{ e.C3 }}">
    </td>

    <td>
        <input name="hora_saida"
               value="{{ e.Hora_Saida }}">
    </td>

    <input type="hidden"
           name="id"
           value="{{ e.id }}">

    <td class="no-print">

        <button type="submit"
                class="btn-save no-print">

            Salvar

        </button>

        <a href="/mapa/{{ e.Setor_ID }}"
           onclick="salvarScroll()"
           class="no-print">

            <button type="button"
                    class="btn-mapa no-print">

                MAPA

            </button>

        </a>

        <button type="submit"
                formaction="/excluir/{{ e.id }}"
                class="btn-delete no-print">

            Excluir

        </button>

    </td>

</tr>

</form>

{% endfor %}

</tbody>

</table>

</div>

<script>

function salvarScroll() {

    localStorage.setItem(
        "scrollPos",
        window.scrollY
    );

}

document.querySelectorAll(
    "button[type='submit']"
).forEach(btn => {

    btn.addEventListener(
        "click",
        salvarScroll
    );

});

window.addEventListener(
    "pageshow",
    () => {

        const pos = localStorage.getItem(
            "scrollPos"
        );

        if (pos !== null) {

            setTimeout(() => {

                window.scrollTo(
                    0,
                    parseInt(pos)
                );

                localStorage.removeItem(
                    "scrollPos"
                );

            }, 50);

        }

    }
);

</script>

</body>
</html>

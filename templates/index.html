<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu Principal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
     background:url('/static/img_2_fundo.png');
    background: linear-gradient(135deg, #667eea, #764ba2);
    height:80%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
}

.card{
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    width: 350px;
    background: white;
}

h1{
    font-weight: bold;
    margin-bottom: 20px;
}

.btn-custom{
    padding: 15px;
    font-size: 18px;
    border-radius: 10px;
    width: 100%;
}

</style>

</head>

<body>

<div class="card">

    <h1>🚛 Sistema de Equipes</h1>

    <p class="mb-4">
        Gerenciamento de frota
    </p>

    <!-- BOTÃO EQUIPES -->
    <a href="{{ url_for('equipes') }}"
       class="btn btn-primary btn-custom mb-3">

        👷 Equipes

    </a>

    <!-- BOTÃO DISPONÍVEIS -->
    <a href="{{ url_for('disponiveis') }}"
       class="btn btn-success btn-custom mb-3">

        📋 Disponíveis

    </a>

    <!-- BOTÃO SAIR -->
    <a href="{{ url_for('logout') }}"
       class="btn btn-danger btn-custom">

        🚪 Sair

    </a>

</div>

</body>
</html>
